services:
  postgres:
    image: postgres:16
    container_name: blocknote_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: blocknote
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blocknote -d blocknote"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  pg_data:
